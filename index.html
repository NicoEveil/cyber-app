<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cyberpunk - Suivi de combat</title>
  <link rel="manifest" href="manifest.json">

  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
  font-family: 'Rajdhani', Arial, sans-serif;
  max-width: 900px;
  margin: 0 auto;
  padding: 25px;
  background: #171717;
  color: #f2f2f2;
}

    h1 {
  text-align: center;
  color: #ff3b67;
  font-size: 38px;
  font-weight: 700;
  letter-spacing: 2px;
  margin-bottom: 30px;
  text-transform: uppercase;
}

    .add-button {
  display: block;
  width: 100%;
  padding: 14px;
  margin-bottom: 18px;

  background: #ff3b67;
  color: black;

  border: 3px solid #ff3b67;
  border-radius: 0;

  font-family: inherit;
  font-size: 22px;
  font-weight: bold;
  letter-spacing: 1px;

  cursor: pointer;

  transition: .15s;
}

    .add-button:hover {
  background: #ff6b8d;
}

.add-pc-button{
    background:#ffd400;
    border-color:#ffd400;
    color:black;
}

.add-pc-button:hover{
    background:#ffe14d;
}

    .pnj-list {
  background: transparent;
  padding: 0;
  box-shadow: none;
}

    .pnj-item {
  background: #1b1b1b;
  border: 3px solid #ff3b67;
  margin-bottom: 18px;
  padding: 16px;
  transition: .15s;
}

  .pnj-item:hover{
    box-shadow:0 0 18px rgba(255,59,103,.35);
}

    .pnj-item:last-child {
      border-bottom: none;
    }

    .modal {
      display: none;
      position: fixed;
      z-index: 1000;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      overflow: auto;
      background-color: rgba(0,0,0,0.5);
    }

    .modal-content {
  background: #1b1b1b;
  color: #f2f2f2;

  margin: 8% auto;
  padding: 24px;

  width: 90%;
  max-width: 460px;

  border: 3px solid #ff3b67;
  border-radius: 0;

  box-sizing: border-box;
}

    .modal-content h2 {
  margin-top: 0;
  margin-bottom: 25px;

  color: #ff3b67;

  font-size: 34px;

  text-transform: uppercase;

  letter-spacing: 1px;
}

    .modal input[type="text"],
.modal input[type="number"] {

  background: #111;
  color: white;
  border: 2px solid #ff3b67;
  border-radius: 0;
  font-family: inherit;
  font-size: 20px;
  padding: 12px;
  width: 100%;
  box-sizing: border-box;
  margin: 8px 0 16px;
}

.modal input::placeholder{
    color:#999;
}

.choice-group h3{

    color:#ff3b67;
    margin-top:20px;
    margin-bottom:10px;
    text-transform:uppercase;
    letter-spacing:1px;
}

.choice-group label{

    display:block;
    color:#eee;
    margin:8px 0;
    font-size:20px;
    cursor:pointer;
}

    .modal button {
      padding: 10px 15px;
      margin: 5px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .validate{
    background:#ff3b67;
    color:black;
    font-weight:bold;
    font-family:inherit;
    border:none;
    border-radius:0;
}

    .cancel{
    background:#333;
    color:white;
    font-weight:bold;
    font-family:inherit;
    border:2px solid #ff3b67;
    border-radius:0;
}

    .damage-btn{
    background:#ff3b67;
    color:black;
    border:none;
    font-family:inherit;
    font-weight:bold;
    padding:7px 14px;
    cursor:pointer;
}

    .edit-btn{
    background:#333;
    color:#ff3b67;
    border:2px solid #ff3b67;
    font-family:inherit;
    font-weight:bold;
    padding:7px 14px;
    cursor:pointer;
    margin-left:6px;
}

    .delete-btn{
    background:none;
    border:none;
    color:#ff3b67;
    font-size:26px;
    font-weight:bold;
    cursor:pointer;
}

    .footer {
  display: flow-root;
  padding-top: 25px;
}

    .reset-button{
    background:#ff3b67;
    color:black;
    border:none;
    border-radius:0;
    font-family:inherit;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

    .reset-button:hover{
    background:#ff6b8d;
}

  </style>
</head>

<body>

<h1>Cyberpunk - Suivi de combat</h1>

<button class="add-button" id="addPnjBtn">
  + Ajouter un PNJ
</button>

<button class="add-button add-pc-button" id="addPcBtn">
  + Ajouter les PJs
</button>

<div class="pnj-list" id="pnjList"></div>

<!-- MODALE AJOUT PNJ -->
<div class="modal" id="pnjModal">
  <div class="modal-content">

    <h2>Ajouter un PNJ</h2>

   <label class="field-label" for="pnjNom">Nom</label>
    <input type="text" id="pnjNom">
  <label class="field-label" for="pnjPS">Points de Santé</label>
    <input type="number" id="pnjPS">
  <label class="field-label" for="pnjArmureCorps">Armure de corps</label>
    <input type="number" id="pnjArmureCorps">
  <label class="field-label" for="pnjArmureTete">Armure de tête</label>
    <input type="number" id="pnjArmureTete">
  <label class="field-label" for="pnjREF">REF</label>
    <input type="number" id="pnjREF">
  <label class="field-label" for="pnjInitiative">Initiative</label>
    <input type="number" id="pnjInitiative">
  <label for="pnjCount" style="display:block; margin-top:10px; margin-bottom:5px; color:#ff3b67; font-weight:bold;">
    Nombre de PNJ à créer
</label>

<input type="number" id="pnjCount" value="1" min="1">

    <button class="validate" id="validatePnjBtn">Valider</button>
    <button class="cancel" id="cancelPnjBtn">Annuler</button>

  </div>
</div>

<!-- MODALE AJOUT PJ -->
<div class="modal" id="pcModal">
  <div class="modal-content">

    <h2>Ajouter les PJs</h2>

    <table style="width:100%;">
      <tr>
        <th style="text-align:left;">Nom</th>
        <th style="width:120px;">Initiative</th>
      </tr>

      <tr><td><input type="text" id="pcNom1"></td><td><input type="number" id="pcInit1"></td></tr>
      <tr><td><input type="text" id="pcNom2"></td><td><input type="number" id="pcInit2"></td></tr>
      <tr><td><input type="text" id="pcNom3"></td><td><input type="number" id="pcInit3"></td></tr>
      <tr><td><input type="text" id="pcNom4"></td><td><input type="number" id="pcInit4"></td></tr>
      <tr><td><input type="text" id="pcNom5"></td><td><input type="number" id="pcInit5"></td></tr>
      <tr><td><input type="text" id="pcNom6"></td><td><input type="number" id="pcInit6"></td></tr>
    </table>

    <button class="validate" id="validatePcBtn">Valider</button>
    <button class="cancel" id="cancelPcBtn">Annuler</button>

  </div>
</div>

<!-- MODALE DEGATS -->
<div class="modal" id="damageModal">
  <div class="modal-content">

    <h2>Appliquer des dégâts</h2>

    <input type="number" id="damageValue" placeholder="Nombre de dégâts">

    <div class="choice-group">
      <h3>Localisation</h3>
      <label><input type="checkbox" id="hitHead"> Tête</label>
      <label><input type="checkbox" id="hitBody"> Corps</label>
    </div>

    <div class="choice-group">
      <h3>Armure</h3>
      <label><input type="checkbox" id="ignoreHalf"> Ignorée de moitié</label>
      <label><input type="checkbox" id="ignoreFull"> Ignorée entièrement</label>
    </div>

    <div class="choice-group">
      <h3>Détérioration</h3>
      <label><input type="checkbox" id="damageArmor" checked> Armure endommagée</label>
    </div>

    <button class="validate" id="applyDamageBtn">Appliquer</button>
    <button class="cancel" id="cancelDamageBtn">Annuler</button>

  </div>
</div>

<!-- FOOTER -->
<div class="footer">
  <button class="reset-button" id="resetBtn">
    Réinitialiser
  </button>
</div>

<script src="app.js"></script>

</body>
</html>
